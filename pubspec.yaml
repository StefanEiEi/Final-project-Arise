name: project_arise
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # AI & Vision
  google_mlkit_pose_detection: ^0.12.0
  camera: ^0.10.5+9
  vector_math: ^2.1.4

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1

  # Utilities & UI
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  font_awesome_flutter: ^10.7.0
  flutter_background_service: ^5.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/BG.jpg
    - assets/images/logo.png
    - assets/images/Google.jpg
    - assets/images/Calidation.png
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Bold.ttf
        - asset: assets/fonts/Orbitron-Black.ttf
        - asset: assets/fonts/Orbitron-ExtraBold.ttf
        - asset: assets/fonts/Orbitron-Medium.ttf
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-SemiBold.ttf
